<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="stylesheet" href="./css/style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <script type="module" src="./js/main.js"></script>
    <title>FundIt - Crowdfunding Platform</title>
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <span>FundIt</span>
        <ul class="nav-links">
          <button class="secondary-btn">Discover</button>
          <button class="secondary-btn">Start a Campaign</button>
          <button class="secondary-btn">About</button>
        </ul>
        <div class="search-wrap">
          <i class="bi bi-search search-icon"></i>
          <input
            class="primary-input"
            type="text"
            placeholder="Search campaigns..."
          />
        </div>
        <div class="auth">
          <button class="secondary-btn" onclick="window.location.href='login.html'">Login</button>
          <button class="primary-btn" onclick="window.location.href='signup.html'">Sign up</button>
          <button class="secondary-btn menu-btn">☰</button>
        </div>
      </nav>
      <div class="sub-header">
        <div class="categories">
          <input type="radio" id="all" name="category" value="All" checked />
          <label for="all">All</label>

          <input type="radio" id="tech" name="category" value="Technology" />
          <label for="tech">Technology</label>

          <input type="radio" id="art" name="category" value="Art" />
          <label for="art">Art</label>

          <input type="radio" id="games" name="category" value="Games" />
          <label for="games">Games</label>

          <input type="radio" id="design" name="category" value="Design" />
          <label for="design">Design</label>

          <input type="radio" id="food" name="category" value="Food" />
          <label for="food">Food</label>

          <input type="radio" id="fashion" name="category" value="Fashion" />
          <label for="fashion">Fashion</label>

          <input type="radio" id="music" name="category" value="Music" />
          <label for="music">Music</label>

          <input type="radio" id="film" name="category" value="Film" />
          <label for="film">Film</label>
        </div>
        <div></div>
      </div>
    </header>
    <main class="main">
      <section class="hero">
        <div class="hero-section">
          <div class="hero-info">
          <h1>Bring creative projects to life</h1>
          <p>
            Join the world's largest funding platform for creative projects.
            Back amazing ideas or start your own campaign today.
          </p>
          <div class="hero-btns">
            <button class="primary-btn">
              Start a campaign
              <i class="bi bi-arrow-right ml-8"></i>
            </button>
          </div>
          <div class="stats">
            <div class="stat">
              <div class="stat__value">$2.1B</div>
              <div class="stat__label">pledged</div>
            </div>

            <div class="stat">
              <div class="stat__value">245K</div>
              <div class="stat__label">campaigns funded</div>
            </div>

            <div class="stat">
              <div class="stat__value">20M</div>
              <div class="stat__label">backers</div>
            </div>
          </div>
        </div>
        <div class="hero-img">
          <img
            src="https://images.unsplash.com/photo-1568992688243-52608227497d"
            alt="people in a workspace"
          />
        </div>
        </div>
      </section>
    </main>
  </body>
</html>
