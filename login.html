<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="stylesheet" href="./css/style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <script type="module" src="./js/main.js"></script>
    <title>Login - FundIt</title>
  </head>
  <body>
    <main class="login-main">
      <div class="back-home">
        <button
          class="secondary-btn login-secondary-btn"
          onclick="window.location.href = 'index.html'"
        >
          <i class="bi bi-arrow-left mr-8"></i>
          Back to Home
        </button>
        <h2>FundIt</h2>
      </div>
      <div class="login-form">
        <section class="login-welcome">
          <div class="welcome-content">
            <h1>Welcome Back</h1>
            <p>
              Welcome back to FundIt, where ideas turn into reality through the
              power of community. Discover innovative projects, support creators
              you believe in, and help bring meaningful ideas to life.
            </p>
          </div>
        </section>
        <section class="login-details">
          <div class="sign-in">
            <h4>Sign In</h4>
            <h5>Welcome back to FundIt</h5>
          </div>
          <div>
            <label for="email-warp">Email Address</label>
            <div class="email-wrap">
              <i class="bi bi-envelope email-icon"></i>
              <input
                class="primary-input"
                type="email"
                placeholder="Enter Your Email"
                minlength="5"
                maxlength="254"
                required
              />
            </div>
          </div>
          <div>
            <div class="forgot-pw">
              <label for="pw-warp">Password</label>
              <a href="#">Forgot password?</a>
            </div>
            <div class="pw-warp">
              <i class="bi bi-lock pw-icon"></i>
              <button type="button" id="togglePassword" class="toggle-btn">
                <i class="bi bi-eye"></i>
              </button>
              <input
                id="password"
                class="primary-input"
                type="password"
                placeholder="Enter Your Password"
                minlength="8"
                maxlength="64"
                required
              />
            </div>
          </div>
          <label class="checkbox-row">
            <input class="check" type="checkbox" />
            <span>Remember me for 30 days</span></label
          >
          <button class="primary-btn">Sign In</button>
          <div class="sign-up">
            <span>Don't have an account?</span>
            <a href="signup.html">Sign up</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
