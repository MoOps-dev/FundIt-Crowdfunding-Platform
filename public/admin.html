<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="stylesheet" href="./css/style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <script type="module" src="./js/main.js"></script>
    <title>Admin Dashboard - FundIt</title>
  </head>
  <body>
    <main class="admin-main hidden">
      <section class="management-menu">
        <section class="side-panel">
          <div class="logo">
            <div>
              <h1>FundIt</h1>
              <h5>Dashboard</h5>
            </div>
          </div>
          <div>
            <ul>
              <li>
                <i class="bi bi-person"></i>
                <span data-section="users">User Management</span>
              </li>
              <li>
                <i class="bi bi-layout-text-window"></i>
                <span data-section="campaigns">Campaign Management</span>
              </li>
              <li>
                <i class="bi bi-cash-coin"></i>
                <span data-section="pledges">Pledges</span>
              </li>
            </ul>
          </div>
        </section>
      </section>
      <section class="dash-mid-section">
        <header class="header">
          <nav class="nav">
            <div class="menu-logo">
              <button class="secondary-btn menu-btn hidden">☰</button>
              <h3>User Management</h3>
            </div>

            <div class="search-wrap">
              <i class="bi bi-search search-icon"></i>
              <input
                id="search"
                class="primary-input"
                type="text"
                placeholder="Search Queries..."
              />
            </div>
            <div id="user-info" class="user-info">
              <i class="bi bi-heart nav-icons"></i>
              <i class="bi bi-bell nav-icons"></i>
              <div class="profile-wrapper">
                <div id="user-avatar" class="user-menu">
                  <span id="avatar" class="avatar"></span>
                  <div class="profile-menu hidden" id="profile-menu">
                    <div class="profile-header">
                      <h3 id="user-name"></h3>
                      <p id="user-email"></p>
                    </div>

                    <ul class="menu-list">
                      <li>
                        <a href="./index.html"
                          ><i class="bi bi-house"></i> Home Page</a
                        >
                      </li>
                      <li>
                        <a href="./new-campaign.html"
                          ><i class="bi bi-rocket-takeoff"></i> New Campaign</a
                        >
                      </li>
                      <li>
                        <a href="./profile.html"
                          ><i class="bi bi-folder"></i> My Campaigns</a
                        >
                      </li>
                      <li>
                        <a href="./profile.html?section=1"
                          ><i class="bi bi-heart"></i>Pledge History</a
                        >
                      </li>
                      <li>
                        <a href="#"><i class="bi bi-gear"></i> Settings</a>
                      </li>
                    </ul>

                    <div class="menu-footer">
                      <a href="#" id="logoutBtn"
                        ><i class="bi bi-box-arrow-right"></i> Log out</a
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </nav>
        </header>
        <template id="pledge-card-template">
          <div class="user-container">
            <div class="user-card">
              <div class="card-header">
                <div class="user-meta">
                  <h4></h4>
                  <p></p>
                </div>
                <span class="status-pill active"></span>
              </div>
              <div class="user-details">
                <div class="detail-item">
                  <span class="detail-label">Amount</span>
                  <span class="amount"></span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Payment Method</span>
                  <span
                    class="method"
                    style="text-transform: capitalize"
                  ></span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Date</span>
                  <span class="date"></span>
                </div>
              </div>
              <button class="btn-ban unban">
                <i class="bi bi-info-circle btn-text">Campaign Info</i>
              </button>
            </div>
          </div>
        </template>
        <template id="user-card-template">
          <div class="user-container">
            <div class="user-card">
              <div class="card-header">
                <div class="user-meta">
                  <h4></h4>
                  <p></p>
                </div>
                <span class="status-pill active"></span>
              </div>
              <div class="user-details">
                <div class="detail-item">
                  <span class="detail-label">Role</span>
                  <span class="detail-value"></span>
                </div>
              </div>
              <button class="btn-ban">
                <i class="bi bi-gear-wide-connected btn-text"></i>
              </button>
            </div>
          </div>
        </template>
        <template id="campaign-card-template">
          <div class="campaign-card">
            <div class="card-image-wrapper">
              <img src="" alt="Campaign Image" class="campaign-img" />
              <span class="category-badge"></span>
            </div>

            <div class="card-content">
              <div>
                <h3 class="campaign-title"></h3>
                <p class="campaign-desc"></p>
              </div>
              <span class="author"
                ><div>by <span class="author-name"></span></div>
                <i class="bi bi-geo-alt"></i
              ></span>

              <div class="progress-container">
                <div class="progress-bar">
                  <div class="progress-fill"></div>
                </div>
              </div>

              <div class="stats-row">
                <div class="stat-item">
                  <span class="raised-amount"></span>
                  <span class="stat-label"
                    >raised of <span class="goal-amount"></span
                  ></span>
                </div>
                <div class="stat-item text-right">
                  <span class="backers-count"></span>
                  <span class="stat-label">backers</span>
                </div>
              </div>

              <div class="card-footer">
                <span class="days-left"></span>
                <span class="status-pill"></span>
              </div>

              <div class="admin-actions">
                <div>
                  <button class="btn-approve primary-btn">Approve</button>
                  <button class="btn-delete">Delete</button>
                </div>
                <button class="btn-edit btn-approve primary-btn">Edit</button>
              </div>
            </div>
          </div>
        </template>
        <div id="campaign-modal" class="modal-overlay hidden">
          <div class="modal-content">
            <div class="review-header">
              <div></div>
              <span class="window-info">Review</span>
              <button id="close-modal" class="close-btn">
                <i class="bi bi-x-lg"></i>
              </button>
            </div>
            <div id="modal-body">
              <header class="campaign-header">
                <div class="name-cat">
                  <h4 id="campaign-title-overview"></h4>
                  <div class="cat-text">
                    <span id="overview-cat"></span>
                  </div>
                </div>
                <div class="amount-duration">
                  <span id="overview-amount" class="amount"></span>
                  <span>&bull;</span>
                  <span id="overview-days" class="days"></span>
                  <span>&bull;</span>
                  <span class="location-text"
                    ><i class="bi bi-geo-alt-fill"> </i>
                    <span id="overview-location"></span>
                  </span>
                </div>
              </header>
              <section class="camp-details-overview">
                <div class="overview-top">
                  <div class="image-container">
                    <img
                      id="overview-img"
                      src=""
                      alt="campaign image overview"
                    />
                    <button id="over-video" type="button" class="remove-btn">
                      <i class="bi bi-youtube" style="color: var(--background);"></i>
                      Watch Video
                    </button>
                  </div>

                  <div><span id="overview-sdesc"></span></div>
                </div>
                <div class="tab-switcher">
                  <input
                    type="radio"
                    name="view"
                    id="cabout"
                    value="cabout"
                    checked
                  />
                  <label for="cabout">About this Campaign</label>

                  <input type="radio" name="view" id="cstory" value="cstory" />
                  <label for="cstory">Story</label>
                </div>
                <div class="long-cabout hidden">
                  <h4>About this Campaign</h4>
                  <p style="font-size: 14px" id="overview-ldesc"></p>
                </div>
                <div class="long-cstory hidden">
                  <h4>Campaign Story</h4>
                  <p style="font-size: 14px" id="overview-lstory"></p>
                </div>
              </section>
            </div>
          </div>
        </div>
        <div class="section-management-content"></div>
        <div id="toast" class="toast"></div>
      </section>
    </main>
    <main id="loading" class="loading">
      <h1>FundIt</h1>
    </main>
  </body>
</html>
