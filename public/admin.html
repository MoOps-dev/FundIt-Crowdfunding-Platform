<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="stylesheet" href="./css/style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <script type="module" src="./js/main.js"></script>
    <title>Admin Dashboard - FundIt</title>
  </head>
  <body>
    <main class="admin-main">
      <section class="management-menu">
        <section class="side-panel">
          <div class="logo">
            <div>
              <h1>FundIt</h1>
              <h5>Dashboard</h5>
            </div>
          </div>
          <div>
            <ul>
              <li>
                <i class="bi bi-person"></i>
                <span data-section="users">User Management</span>
              </li>
              <li>
                <i class="bi bi-layout-text-window"></i>
                <span data-section="campaigns">Campaign Management</span>
              </li>
              <li>
                <i class="bi bi-cash-coin"></i>
                <span data-section="pledges">Pledges</span>
              </li>
            </ul>
          </div>
        </section>
      </section>
      <section>
        <header class="header">
          <nav class="nav">
            <h3>User Management</h3>
            <div class="search-wrap">
              <i class="bi bi-search search-icon"></i>
              <input
                id="search"
                class="primary-input"
                type="text"
                placeholder="Search Queries..."
              />
            </div>
            <div id="user-info" class="user-info">
              <i class="bi bi-heart nav-icons"></i>
              <i class="bi bi-bell nav-icons"></i>
              <div class="profile-wrapper">
                <div id="user-avatar" class="user-menu">
                  <span id="avatar" class="avatar"></span>
                  <div class="profile-menu hidden" id="profile-menu">
                    <div class="profile-header">
                      <h3 id="user-name"></h3>
                      <p id="user-email"></p>
                    </div>

                    <ul class="menu-list">
                        <li>
                        <a href="./index.html"><i class="bi bi-house"></i> Home Page</a>
                      </li>
                      <li>
                        <a href="#"><i class="bi bi-person"></i> Profile</a>
                      </li>
                      <li>
                        <a href="#"
                          ><i class="bi bi-folder"></i> My Campaigns</a
                        >
                      </li>
                      <li>
                        <a href="#"
                          ><i class="bi bi-heart"></i> Backed Campaigns</a
                        >
                      </li>
                      <li>
                        <a href="#"><i class="bi bi-gear"></i> Settings</a>
                      </li>
                    </ul>

                    <div class="menu-footer">
                      <a href="#" id="logoutBtn"
                        ><i class="bi bi-box-arrow-right"></i> Log out</a
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </nav>
        </header>
        <template id="user-card-template">
          <div class="user-container">
            <div class="user-card">
              <div class="card-header">
                <div class="user-meta">
                  <h4></h4>
                  <p></p>
                </div>
                <span class="status-pill active"></span>
              </div>
              <div class="user-details">
                <div class="detail-item">
                  <span class="detail-label">Role</span>
                  <span class="detail-value"></span>
                </div>
              </div>
              <button class="btn-ban">
                <i class=" bi bi-gear-wide-connected btn-text"></i>
              </button>
            </div>
          </div>
        </template>
        <div class="section-management-content"></div>
        <div id="toast" class="toast"></div>
      </section>
    </main>
  </body>
</html>
